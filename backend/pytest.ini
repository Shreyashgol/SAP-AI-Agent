[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --tb=short
    -q
    --cov=app
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=80
markers =
    unit: Unit tests — no external dependencies
    integration: Integration tests — requires running DB and Redis
    security: Security test suite — SQL injection, RBAC, RLS
    performance: Performance benchmarks
