name: Deploy to Production

on:
  push:
    branches: [main]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: latest)"
        required: false
        default: "latest"

concurrency:
  group: deploy-production
  cancel-in-progress: false   # never cancel an in-progress deploy

env:
  REGISTRY: ghcr.io
  IMAGE_REPO: ${{ github.repository_owner }}/sap-ai-platform

jobs:
  # ── Build and push images ───────────────────────────────────────────────────
  build:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/api
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/frontend
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: runtime
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/api:${{ steps.meta.outputs.version }},${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: runtime
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/frontend:${{ steps.meta.outputs.version }},${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  # ── Security scan ───────────────────────────────────────────────────────────
  security-scan:
    name: Trivy vulnerability scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Scan API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/api:latest
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-api.sarif

  # ── Deploy ──────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production host
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    environment: production
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag || needs.build.outputs.image_tag || 'latest' }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.PROD_DEPLOY_PATH }}

            # Pull latest compose file from repo (already checked out on server)
            git pull --ff-only origin main

            # Log in to registry on the server
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull new images
            IMAGE_TAG=${{ steps.tag.outputs.tag }} \
              docker compose -f docker-compose.prod.yml pull api frontend

            # Zero-downtime rolling restart — api first, then worker
            IMAGE_TAG=${{ steps.tag.outputs.tag }} \
              docker compose -f docker-compose.prod.yml up -d \
                --no-deps --scale api=2 api

            sleep 15  # allow new containers to pass healthchecks

            IMAGE_TAG=${{ steps.tag.outputs.tag }} \
              docker compose -f docker-compose.prod.yml up -d \
                --no-deps worker beat frontend nginx

            # Run any pending migrations
            docker compose -f docker-compose.prod.yml run --rm api \
              alembic upgrade head

            # Remove old images
            docker image prune -f

  # ── Smoke test ──────────────────────────────────────────────────────────────
  smoke-test:
    name: Post-deploy smoke test
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Health liveness check
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              ${{ secrets.PROD_URL }}/api/v1/health/live)
            if [ "$STATUS" = "200" ]; then
              echo "Liveness check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i failed (status $STATUS), retrying..."
            sleep 10
          done
          echo "Smoke test FAILED after 5 attempts"
          exit 1

      - name: Readiness check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            ${{ secrets.PROD_URL }}/api/v1/health/ready)
          if [ "$STATUS" != "200" ]; then
            echo "Readiness check failed: HTTP $STATUS"
            exit 1
          fi
          echo "Readiness check passed"
