name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend — Lint, Type-check, Test, Security
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: sap_ai_platform_test
          POSTGRES_USER: platform_user
          POSTGRES_PASSWORD: test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://platform_user:test-password@localhost:5432/sap_ai_platform_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      APP_SECRET_KEY: ci-test-secret-key-minimum-32-characters
      JWT_SECRET_KEY: ci-jwt-secret-key-minimum-32-characters
      ANTHROPIC_API_KEY: sk-ant-test-key
      ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS0zMi1ieXRlcw==
      POSTGRES_USER: platform_user
      POSTGRES_PASSWORD: test-password
      APP_ENV: development
      DEBUG: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .

      - name: Type check (mypy)
        working-directory: backend
        run: mypy app/

      - name: Security scan (bandit)
        working-directory: backend
        run: bandit -r app/ -ll -x app/tests

      - name: Dependency audit (pip-audit)
        working-directory: backend
        run: pip-audit --ignore-vuln PYSEC-2022-42969

      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Run tests
        working-directory: backend
        run: pytest -m "unit or integration" --cov=app --cov-report=xml --cov-fail-under=80

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend

  docker-build:
    name: Docker build check (multi-stage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (runtime target)
        run: |
          docker buildx build ./backend \
            --file ./backend/Dockerfile \
            --target runtime \
            --tag sap-ai-platform-api:ci \
            --load

      - name: Build Frontend image (runtime target)
        run: |
          docker buildx build ./frontend \
            --file ./frontend/Dockerfile \
            --target runtime \
            --tag sap-ai-platform-frontend:ci \
            --load

      - name: Verify API image runs as non-root
        run: |
          USER_ID=$(docker run --rm --entrypoint id sap-ai-platform-api:ci -u)
          if [ "$USER_ID" = "0" ]; then
            echo "ERROR: API container runs as root"
            exit 1
          fi
          echo "API image UID: $USER_ID (non-root)"

  security-scan-pr:
    name: Trivy scan (PR gate)
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'pull_request'
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Build API image for scan
        run: |
          docker buildx build ./backend \
            --file ./backend/Dockerfile \
            --target runtime \
            --tag sap-ai-platform-api:scan \
            --load

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: sap-ai-platform-api:scan
          format: table
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  frontend:
    name: Frontend — Lint, Type-check, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run type-check

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
