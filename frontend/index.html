<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Enterprise AI Intelligence Platform — Business analytics powered by AI" />
    <title>Enterprise AI Platform</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      // Apply the saved (or system) theme before paint to avoid a flash of light.
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (t === "dark" || (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
